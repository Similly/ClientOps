services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clientops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/clientops?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: dev-secret-change-me
      UPLOAD_DIR: uploads
      MAX_UPLOAD_MB: 10
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
